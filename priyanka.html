<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priyanka Chopra Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* Animated Gradient  */
body{
    height:100vh;
    background: 
        linear-gradient(-45deg, rgba(255,106,0,0.7), rgba(238,9,121,0.7), rgba(0,198,255,0.7), rgba(0,114,255,0.7)),
        url('priya.jpg');
    background-size:300% 300%, cover;
    background-position:center;
    animation:gradient 10s ease infinite;
    color:white;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

nav h1{
    font-size:28px;
}

/* Hero Section */
.hero{
    height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* PROFILE IMAGE */
.hero img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin-bottom:20px;
    transition:0.3s;
}

.hero img:hover{
    transform:scale(1.1);
}

.hero h2{
    font-size:60px;
}

.hero p{
    margin-top:10px;
    opacity:0.8;
}

/* Video Background */
.video-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
    opacity:0.2;
}

/* Glass Cards */
.section{
    padding:60px 20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:20px;
    transition:0.3s;
    opacity:0;
    transform:translateY(40px);
}

.card:hover{
    transform:scale(1.05);
}

/* Footer */
footer{
    text-align:center;
    padding:20px;
    opacity:0.7;
}
</style>
</head>

<body>

<!-- Background Video -->
<video autoplay muted loop class="video-bg">
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<!-- Navbar -->
<nav>
    <h1>Priyanka Chopra</h1>
</nav>

<!-- Hero -->
<section class="hero">

    <!-- PROFILE IMAGE -->
    <img src="https://i.pinimg.com/1200x/dc/e2/7c/dce27cbaa027a4e0a5b4bdbbeb1b3938.jpg" alt="Priyanka Chopra">

    <h2>Priyanka Chopra</h2>
    <p>Global Icon • Actress • Producer</p>
</section>

<!-- Achievements -->
<section class="section">
    <h2 style="text-align:center;margin-bottom:20px;">Achievements</h2>
    <div class="cards">
        <div class="card">Miss World 2000 🌍</div>
        <div class="card">Hollywood Actress 🎬</div>
        <div class="card">UNICEF Goodwill Ambassador 🤝</div>
    </div>
</section>

<!-- Projects -->
<section class="section">
    <h2 style="text-align:center;margin-bottom:20px;">Popular Works</h2>
    <div class="cards">
        <div class="card">Quantico</div>
        <div class="card">Baywatch</div>
        <div class="card">The White Tiger</div>
    </div>
</section>

<!-- Contact -->
<section class="section">
    <h2 style="text-align:center;">Contact</h2>
    <p style="text-align:center;">info@priyankachopra.com</p>
</section>

<footer>
    © 2026 Priyanka Chopra Portfolio
</footer>

<script>
// Scroll Animation
window.addEventListener("scroll", () => {
    document.querySelectorAll(".card").forEach(card => {
        let position = card.getBoundingClientRect().top;
        if(position < window.innerHeight){
            card.style.opacity = 1;
            card.style.transform = "translateY(0)";
        }
    });
});
</script>

</body>
</html>
